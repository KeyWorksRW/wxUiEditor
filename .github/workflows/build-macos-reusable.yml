name: "Reusable macOS Build"

on:
  workflow_call:
    inputs:
      create-setup:
        description: 'Whether to create macOS DMG installer'
        required: false
        type: boolean
        default: false
      build-type:
        description: 'Build type (Debug or Release)'
        required: false
        type: string
        default: 'Release'
      runner-type:
        description: 'Runner label (macos-15 for universal build, or self-hosted labels)'
        required: false
        type: string
        default: 'macos-15'
      enable-pgo:
        description: 'Enable Profile-Guided Optimization (Clang-only, Release-only)'
        required: false
        type: boolean
        default: false

jobs:
  buildMacOS:
    runs-on: ${{ inputs.runner-type }}
    env:
      SCCACHE_DIR: ${{github.workspace}}/.sccache
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Xcode
      if: ${{ !startsWith(inputs.runner-type, 'self-hosted') }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Setup CMake 4.2+ and Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: 'latest'
        ninjaVersion: 'latest'

    - run: mkdir ${{github.workspace}}/build

    - name: Install dependencies
      if: ${{ !startsWith(inputs.runner-type, 'self-hosted') }}
      run: |
        clang++ --version
        cmake --version

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    # Note: FetchContent is intentionally NOT cached. The kwxFetch repo updates
    # weekly from wxWidgets master, and stale cache can cause build failures
    # due to partial/mismatched source files.

    # ── Non-PGO path: standard build ───────────────────────────────────────

    - name: Configure CMake (GitHub runner - universal binary)
      if: ${{ !startsWith(inputs.runner-type, 'self-hosted') && !inputs.enable-pgo }}
      run: |
        clang++ --version
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{inputs.build-type}} -GNinja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    - name: Configure CMake (self-hosted - native architecture)
      if: ${{ startsWith(inputs.runner-type, 'self-hosted') && !inputs.enable-pgo }}
      run: |
        clang++ --version
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{inputs.build-type}} -GNinja

    - name: Build wxUiEditor
      if: ${{ !inputs.enable-pgo }}
      run: |
        cmake --build ${{github.workspace}}/build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) --config ${{inputs.build-type}} --target wxUiEditor

    # ── PGO path: instrument → profile → optimize ──────────────────────────

    - name: Configure CMake — Instrumented (PGO)
      if: ${{ inputs.enable-pgo }}
      run: |
        clang++ --version
        cmake -B ${{github.workspace}}/build -GNinja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DUSE_PGO_INSTRUMENT=ON
          -DUSE_PGO_OPTIMIZE=OFF

    - name: Build — Instrumented (PGO)
      if: ${{ inputs.enable-pgo }}
      run: cmake --build ${{github.workspace}}/build -j$(sysctl -n hw.ncpu) --config Release

    - name: Collect PGO Profiles
      if: ${{ inputs.enable-pgo }}
      run: ${{github.workspace}}/bin/Release/wxUiEditor --verify_all ${{github.workspace}}/src/wxui/wxUiEditor.wxui
      env:
        LLVM_PROFILE_FILE: ${{github.workspace}}/build/pgo_profiles/%p_%m.profraw

    - name: Merge PGO Profiles
      if: ${{ inputs.enable-pgo }}
      run: >-
        llvm-profdata merge
        -output=${{github.workspace}}/build/pgo_profiles/merged.profdata
        ${{github.workspace}}/build/pgo_profiles/*.profraw

    - name: Configure CMake — Optimized (PGO)
      if: ${{ inputs.enable-pgo }}
      run: |
        cmake -B ${{github.workspace}}/build -GNinja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DUSE_PGO_OPTIMIZE=ON
          -DUSE_PGO_INSTRUMENT=OFF

    - name: Build — PGO Optimized
      if: ${{ inputs.enable-pgo }}
      run: cmake --build ${{github.workspace}}/build -j$(sysctl -n hw.ncpu) --config Release

    - name: Build DMG
      if: ${{ inputs.create-setup }}
      run: |
        cd build
        cpack -G DragNDrop -C ${{inputs.build-type}}

    - name: Create DMG Artifact
      if: ${{ inputs.create-setup }}
      uses: actions/upload-artifact@v4
      with:
        name: macOS-DMG-universal
        path: |
          build/wxUiEditor-*-Darwin.dmg
